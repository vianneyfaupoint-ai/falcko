name: Content Extractor - Learning Mode

on:
  workflow_dispatch:
    inputs:
      search_query:
        description: 'Rechercher du contenu (ex: "falcko error 404")'
        required: false
        default: ''
      video_url:
        description: 'URL directe de la vidéo (YouTube, Vimeo, etc.)'
        required: false
        default: ''

jobs:
  extract:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Récupérer le code du dépôt
      uses: actions/checkout@v4
    
    - name: 🐍 Configurer Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: 📦 Installer FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
    
    - name: 📦 Installer Tesseract OCR
      run: |
        sudo apt-get install -y tesseract-ocr
    
    - name: 🔧 Installer dépendances Python
      run: |
        pip install --upgrade pip
        pip install yt-dlp openai-whisper torch opencv-python pytesseract pillow numpy requests beautifulsoup4
    
    - name: 🔍 Mode Recherche
      if: github.event.inputs.search_query != ''
      run: |
        python detector.py --search "${{ github.event.inputs.search_query }}"
    
    - name: 🎬 Mode Extraction
      if: github.event.inputs.video_url != ''
      run: |
        python detector.py --url "${{ github.event.inputs.video_url }}" --output extracted_content
       
    - name: 📤 Upload fichiers extraits
      if: always() && github.event.inputs.video_url != ''
      uses: actions/upload-artifact@v4
      with:
        name: extracted-content
        path: extracted_content/
        retention-days: 7
    
    - name: 📤 Upload résultats recherche
      if: always() && github.event.inputs.search_query != ''
      uses: actions/upload-artifact@v4
      with:
        name: search-results
        path: output/
        retention-days: 7
    
    - name: 📊 Résumé
      if: always()
      run: |
        echo "========================================="
        echo "✅ Opération terminée !"
        echo "========================================="
        if [ -d "extracted_content" ]; then
          echo "📁 Fichiers extraits :"
          ls -lh extracted_content/ 2>/dev/null || echo "Aucun fichier"
        fi
        if [ -d "output" ]; then
          echo "📁 Résultats recherche :"
          ls -lh output/ 2>/dev/null || echo "Aucun résultat"
        fi
        echo "💾 Téléchargez via l'onglet Artifacts"
        echo "========================================="

